[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #FF00000

secondary = #8ABEB7
disabled = #707880

[bar/mainbar-i3]
monitor = ${env:MONITOR}

width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.mantle}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1
padding-top = 5

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "ShureTechMono Nerd Font:size=15;3"
font-1 = monospace;2

modules-left = i3 xwindow
modules-center = spotify1
modules-right = systray pulseaudio memory cpu eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/tray]
type = internal/tray

;format-margin = 8px
;tray-spacing = 8px
tray-size = 20
tray-padding = 2
tray-offset-x = 0
tray-offset-y = 0
tray-foreground = ${colors.text}
tray-background = ${colors.base}
format-background = ${colors.base}

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = false

label-active = %name%
label-active-background = ${colors.mantle}
label-active-underline= ${colors.lavender}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.lavender}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.mauve}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.mantle}
label-indicator-background = ${colors.blue}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.maroon}
label = %percentage_used:2%%
label-foreground = ${colors.text}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.peach}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
label-connected = %{F#cba6f7}%local_ip%%{F-}

[module/date]
type = internal/date
interval = 1

; date-alt = %H:%M
date = %Y-%m-%d %I:%M:%S %p

label = %date%
label-foreground = ${colors.sky}

[settings]
screenchange-reload = true
pseudo-transparency = true

################################################################################
################################################################################
############                       MODULE I3                        ############
################################################################################
################################################################################

[module/i3]
;https://github.com/jaagr/polybar/wiki/Module:-i3
type = internal/i3

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = false

; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = false

; Create click handler used to focus workspace
; Default: true
enable-click = true

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = true

; Wrap around when reaching the first/last workspace
; Default: true
wrapping-scroll = false

; Set the scroll cycle direction
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning
; icons to workspaces
; Example: code;‚ôö will apply the icon to all workspaces
; containing 'code' in the label
; Default: false
fuzzy-match = false

;extra icons to choose from
;http://fontawesome.io/cheatsheet/
; ÔĄ° ÔČ¨ ÔČ© Ôā≠ ÔÖľ ÔĆÄ ÔĀ≠v  ÔĄē ÔĀľ ÔĀĽ ÔČí

; ws-icon-0 = 1;Ôā¨
; ws-icon-1 = 2;Ôáč
; ws-icon-2 = 3;ÔáĽ
; ws-icon-3 = 4;ÔÉÉ
; ws-icon-4 = 5;ÔÄĺ
; ws-icon-5 = 6;ÔÄĹ
; ws-icon-6 = 7;ÔĄČ
; ws-icon-7 = 8;ÔĀľ
; ws-icon-8 = 9;ÔčÜ
; ws-icon-9 = 10;ÔÜį
; ws-icon-default = "ÔČ¨ "

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = #000000
label-mode-background = #FFBB00

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
; focused = Active workspace on focused monitor
label-focused = %icon% %name%
label-focused-background = ${colors.green}
label-focused-foreground = ${colors.mantle}
label-focused-underline = ${colors.green}
label-focused-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
; unfocused = Inactive workspace on any monitor
label-unfocused = %icon% %name%
label-unfocused-padding = 1
label-unfocused-padding_right = 2
label-unfocused-background = ${colors.base}
label-unfocused-foreground = ${colors.green}
label-unfocused-underline =

; visible = Active workspace on unfocused monitor
label-visible = %icon% %name%
label-visible-background = ${self.label-focused-background}
label-visible-foreground = ${self.label-focused-foreground}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
; urgent = Workspace with urgency hint set
label-urgent = %icon% %name%
label-urgent-background = ${self.label-focused-background}
label-urgent-foreground = #db104e
label-urgent-padding = 1

format-foreground = ${colors.text}
format-background = ${colors.base}

[module/spotify1]
;https://github.com/NicholasFeldman/dotfiles/blob/master/polybar/.config/polybar/spotify.sh
type = custom/script
exec = ~/.config/polybar/scripts/spotify1.sh
interval = 1

;format = <label>
format-foreground = ${colors.green}
format-background = ${colors.mantle}
format-padding = 1
format-underline = ${colors.mantle}
format-prefix = "ÔÜľ  "
format-prefix-foreground = #0f0
label = %output:0:150%
click-left = playerctl play-pause spotify

################################################################################

[module/spotify2]
;install zscroll
;https://github.com/PrayagS/polybar-spotify
type = custom/script
tail = true
format-prefix = "ÔÜľ  "
format = <label>
format-foreground = ${colors.green}
format-background = ${colors.mantle}
exec = ~/.config/polybar/scripts/scroll_spotify_status.sh
click-left = playerctl play-pause spotify


[module/spotify-prev]
type = custom/script
exec = echo " ÔĄÄ "
format = <label>
format-foreground = ${colors.text}
format-background = ${colors.mantle}
click-left = playerctl previous spotify
click-right = spotify

[module/spotify-play-pause]
type = custom/ipc
hook-0 = echo "ÔĀč"
hook-1 = echo "ÔĀĆ"
initial = 1
format-foreground = ${colors.text}
format-background = ${colors.mantle}
click-left = playerctl play-pause spotify
click-right = spotify

[module/spotify-next]
type = custom/script
exec = echo " ÔĄĀ "
format = <label>
format-foreground = ${colors.text}
format-background = ${colors.mantle}
click-left = playerctl next spotify
click-right = spotify

################################################################################

[module/weather]
type = custom/script
interval = 10
format = <label>
format-prefix = "ÔÉā "
format-prefix-foreground = #3EC13F
format-underline = #3EC13F
format-foreground = ${colors.text}
format-background = ${colors.mantle}
exec = python -u ~/.config/polybar/scripts/weather.py
tail = true


; vim:ft=dosini
